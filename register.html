<!DOCTYPE html>
<html lang="en">
<head>
    <title>register</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <form id="registerForm" class="yup" action="register.php" method="POST">

        <label class="heading">REGISTER</label><br><br>

        <label>Full Name:</label><br>
        <input id="name" name="name" type="text" placeholder="Full Name" required><br>

        <label>Gender:</label><br>
        <div class="gender-group">
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female<br><br>
        </div>        
        <label>Age:</label><br>
        <input type="number" name="age" placeholder="Age" max="100"><br>

        <label>Email:</label><br>
        <input id="email" name="email" type="email" placeholder="Email" required><br>

        <label>Username:</label><br>
        <input name="username" type="text" placeholder="Username" required><br><br>

        <label>Password:</label><br>
        <input id="password" name="password" type="password" placeholder="Password" required><br>

        <input type="submit" value="Submit">

    </form>

    <script src="script.js"></script>

</body>
</html>
